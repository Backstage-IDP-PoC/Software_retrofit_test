apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: retrofit-jenkins-argocd
  title: Integrate CI/CD into Developer's Existing Repository
  description: Integrate CI/CD into Developer's Existing Repository

spec:
  owner: development
  type: service

  parameters:
    - title: Select Existing Repository
      required:
        - repo
        - component_id
        - environment

      properties:

        repo:
          title: Select Repository
          type: string
          # ui:field: RepoDropdown

        component_id:
          title: Component Name
          type: string

        environment:
          title: Environment
          type: string
          enum:
            - dev
            - uat
            - staging
            - prod
            

  steps:

    - id: fetch-base
      name: Fetch Template Files
      action: fetch:template
      input:
        url: ./template
        values:
          app_name: ${{ parameters.component_id }}
          app_env: ${{ parameters.environment }}

    - id: push-to-main
      name: Onboarding Developer's Repository 
      action: github:push
      input:
        repoUrl: github.com?owner=Backstage-IDP-PoC&repo=${{ parameters.repo }}
        branch: main
        commitMessage: "Inject CI/CD template [skip ci]"
        sourcePath: ./

  output:
    links:
      - title: View Repository
        url: https://github.com/Backstage-IDP-PoC/${{ parameters.repo }}
