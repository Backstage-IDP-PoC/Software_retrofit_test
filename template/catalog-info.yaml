apiVersion: backstage.io/v1alpha1
kind: Component

metadata:
  name: ${{values.app_name}}
  description: Service ${{values.app_name}}

  annotations:
    github.com/project-slug: Backstage-IDP-PoC/${{values.app_name}}
    backstage.io/techdocs-ref: dir:.
    jenkins.io/job-full-name: Backstage_PoC/${{values.app_name}}/main
    argocd/app-name: ${{ values.app_name | lower }}
    backstage.io/kubernetes-id: ${{values.app_name}}
    backstage.io/kubernetes-namespace: default

      links:
    - url: http://35.208.92.122:8080/job/{{app_name}}/build
      title: Trigger Build
      icon: build

    - url: https://35.184.124.65/applications/{{app_name}}
      title: Open ArgoCD
      icon: dashboard

spec:
  type: service
  owner: development
  lifecycle: experimental
